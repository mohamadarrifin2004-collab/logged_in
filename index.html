<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged In</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Logged In</h1>

    <!-- Login / Sign Up Page -->
    <div id="authPage">
        <h3>Login</h3>

        <div class="auth-row">
            <input id="email" type="email" placeholder="Email">

            <input id="password" type="password" placeholder="Password">

            <button onclick="signUp()">
                Sign Up
            </button>

            <button onclick="signIn()">
                Sign In
            </button>

            <button onclick="sendPasswordReset()">
                Forgot Password?
            </button>
        </div>
    </div>

    <!-- Reset Password Page -->
    <div id="resetPasswordPage" style="display: none;">
        <h3>Reset Password</h3>

        <div class="auth-row">
            <input id="newPassword" type="password" placeholder="New password">

            <button onclick="updatePassword()">
                Update Password
            </button>
        </div>
    </div>

    <!-- Main App Page -->
    <div id="appPage" style="display: none;">

        <div class="nav-row">
            <button onclick="signOut()">
                Logout
            </button>
        </div>

        <!-- Main workout logging page -->
        <div id="loggerPage">

            <div class="nav-row">
                <button onclick="showManageExercisesPage()">
                    Manage Exercises
                </button>
            </div>

            <div class="workout-type-row">
                <button onclick="selectUpper()">
                    Upper
                </button>

                <button onclick="selectLower()">
                    Lower
                </button>

                <button onclick="selectCore()">
                    Core
                </button>
            </div>

            <div class="form-row">
                <select id="exercise" onchange="renderPreviousWorkouts()"></select>

                <input id="workoutDate" type="date" onchange="renderPreviousWorkouts()">

                <div class="weight-row">
                    <input 
                        id="weight" 
                        type="number" 
                        step="0.5" 
                        min="0" 
                        placeholder="Weight kg" 
                        oninput="turnOffBodyweight()"
                    >

                    <button id="bodyweightButton" type="button" onclick="toggleBodyweight()">
                        BW
                    </button>
                </div>

                <input id="reps" type="number" min="1" placeholder="Reps">

                <button id="setButton" onclick="addSet()">
                    Add Set
                </button>
            </div>

            <div class="quick-reps-row">
                <span>Quick reps:</span>

                <button type="button" onclick="setReps(5)">5</button>
                <button type="button" onclick="setReps(6)">6</button>
                <button type="button" onclick="setReps(7)">7</button>
                <button type="button" onclick="setReps(8)">8</button>
                <button type="button" onclick="setReps(9)">9</button>
                <button type="button" onclick="setReps(10)">10</button>
            </div>

            <p id="previousWorkout"></p>

            <h3>Workout History</h3>

            <button onclick="toggleSortOrder()">
                Sort
            </button>

            <ul id="setList"></ul>

        </div>

        <!-- Exercise management page -->
        <div id="manageExercisesPage" style="display: none;">

            <div class="nav-row">
                <button onclick="showLoggerPage()">
                    Back to Logger
                </button>
            </div>

            <h3>Manage Exercises</h3>

            <div class="workout-type-row">
                <button onclick="selectManageWorkoutType('Upper')">
                    Upper
                </button>

                <button onclick="selectManageWorkoutType('Lower')">
                    Lower
                </button>

                <button onclick="selectManageWorkoutType('Core')">
                    Core
                </button>
            </div>

            <p id="manageExerciseTypeDisplay">
                Selected: Upper
            </p>

            <div class="custom-exercise-row">
                <input id="customExercise" placeholder="New exercise name">

                <button onclick="addCustomExercise()">
                    Add Exercise
                </button>
            </div>

            <h4>Current Exercises</h4>

            <ul id="exerciseList"></ul>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

</body>
</html>
